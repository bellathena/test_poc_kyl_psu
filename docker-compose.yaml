services:
  postgres:
    image: postgres:17-alpine
    container_name: test_poc
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: test_poc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: Uncomment the next line to run an initial SQL script on startup
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: